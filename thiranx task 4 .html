<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        #weather-display { margin-top: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; min-width: 250px; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>Weather Search</h1>
    <form id="weather-form">
        <input type="text" id="city-input" placeholder="Enter city name..." required>
        <button type="submit">Get Weather</button>
    </form>

    <div id="weather-display">Please search for a city.</div>

    <script>
        const API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your actual OpenWeatherMap API Key
        const form = document.getElementById('weather-form');
        const display = document.getElementById('weather-display');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const city = document.getElementById('city-input').value;
            display.innerHTML = 'Loading...';

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) {
                    throw new Error(response.status === 404 ? "City not found" : "Failed to fetch data");
                }

                const data = await response.json();
                renderWeather(data);
            } catch (err) {
                display.innerHTML = `<p class="error">${err.message}</p>`;
            }
        });

        function renderWeather(data) {
            // Parsing nested JSON
            const { name, main, wind, weather } = data;
            display.innerHTML = `
                <h2>${name}</h2>
                <p>Temperature: ${main.temp}°C</p>
                <p>Humidity: ${main.humidity}%</p>
                <p>Wind Speed: ${wind.speed} m/s</p>
                <p>Condition: ${weather[0].description}</p>
            `;
        }
    </script>
</body>
</html>
