<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced Responsive Portfolio showcasing modern CSS3 layouts.">
    <title>Responsive Portfolio</title>
    <style>
        /* 1. CUSTOM CSS VARIABLES (Theme System) */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --nav-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        /* Automatically switches to Dark Mode if user prefers it */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --card-bg: #1e293b;
                --nav-bg: #1e293b;
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            }
        }

        /* General Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 2. FLEXBOX (Localized Component Alignment for Navigation) */
        header {
            background-color: var(--nav-bg);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--primary-color);
        }

        /* Main Layout Wrapper */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        section {
            margin-bottom: 4rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            border-left: 5px solid var(--primary-color);
            padding-left: 0.75rem;
        }

        /* Hero Area Styling */
        .hero-section {
            text-align: center;
            padding: 4rem 1rem;
        }

        .hero-section h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        /* 3. CSS GRID (Complex, Two-Dimensional Layout for Projects) */
        .projects-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobile default: 1 column */
            gap: 2rem;
        }

        .project-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        /* Accessible Contact Form Styling */
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.5rem;
        }
